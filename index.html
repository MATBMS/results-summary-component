<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./icons/favicon-32x32.png"
    />

    <link rel="stylesheet" href="./styles/main.css" />

    <title>Results summary component</title>
  </head>
  <body>
    <main class="summary-card">
      <div class="result-container">
        <div class="result-content">
          <h1 class="sr-only">Results Summary Component</h1>
          <h2 class="result-title">Your Result</h2>
          <div class="result-score">
            <div class="score-content">
              <span>76</span>
              <p>of 100</p>
            </div>
          </div>
          <div class="result-feedback">
            <h3>Great</h3>
            <p>
              You scored higher than 65% of the people who have taken these
              tests.
            </p>
          </div>
        </div>
      </div>
      <div class="summary-container">
        <h2 class="summary-title">Summary</h2>
        <div class="summary-scores">
          <div class="summary-item">
            <div class="summary-item-label">
              <img
                src="./icons/icon-reaction.svg"
                alt="icon of a red flash"
                class="summary-label-icon"
              />
              <p class="summary-label-text text-red">Reaction</p>
            </div>
            <div class="summary-item-score">
              <p class="text-bold text-navy">
                80 <span class="text-half-opacity">/ 100</span>
              </p>
            </div>
          </div>
          <div class="summary-item">
            <div class="summary-item-label">
              <img
                src="./icons/icon-memory.svg"
                alt="icon of a yellow brain"
                class="summary-label-icon"
              />
              <p class="summary-label-text text-yellow">Memory</p>
            </div>
            <div class="summary-item-score">
              <p class="text-bold text-navy">
                92 <span class="text-half-opacity">/ 100</span>
              </p>
            </div>
          </div>
          <div class="summary-item">
            <div class="summary-item-label">
              <img
                src="./icons/icon-verbal.svg"
                alt="icon of a green text bubble"
                class="summary-label-icon"
              />
              <p class="summary-label-text text-green">Verbal</p>
            </div>
            <div class="summary-item-score">
              <p class="text-bold text-navy">
                61 <span class="text-half-opacity">/ 100</span>
              </p>
            </div>
          </div>
          <div class="summary-item">
            <div class="summary-item-label">
              <img
                src="./icons/icon-visual.svg"
                alt="icon of a blue eye"
                class="summary-label-icon"
              />
              <p class="summary-label-text text-blue">Visual</p>
            </div>
            <div class="summary-item-score">
              <p class="text-bold text-navy">
                72 <span class="text-half-opacity">/ 100</span>
              </p>
            </div>
          </div>
        </div>
        <button>Continue</button>
      </div>
    </main>
  </body>
</html>
